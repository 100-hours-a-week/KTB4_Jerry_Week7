<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>톡톡</title>
    <link rel="stylesheet" href="./dist/styles.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="mx-auto w-full max-w-170 pb-8">
      <p
        class="py-8 text-center text-[1.375rem] font-medium leading-snug text-ink"
      >
        게시판을 두드려봐요,
        <span class="font-bold text-coral-strong">톡톡</span>
      </p>

      <div
        class="flex h-11 items-center gap-2 rounded-field border border-line bg-surface px-4"
      >
        <span
          class="h-4.5 w-4.5 shrink-0 bg-ink-subtle"
          style="
            mask: url(&quot;assets/icons/icon_search.svg&quot;) no-repeat
              center / contain;
          "
        ></span>
        <input
          id="searchInput"
          type="search"
          placeholder="검색어를 입력하세요"
          class="w-full bg-transparent text-body text-ink placeholder:text-placeholder focus:outline-none"
        />
      </div>

      <div class="mt-6 flex items-center justify-between">
        <h2 class="text-heading text-ink">전체 글</h2>
        <a
          href="/pages/make-post.html"
          class="rounded-xl bg-coral px-5 py-2.5 text-label font-bold text-white transition hover:brightness-95"
        >
          글쓰기
        </a>
      </div>

      <ul id="postList" class="mt-4 flex flex-col gap-4"></ul>
      <div id="scrollSentinel" class="h-10"></div>
    </main>
    <script type="module" src="/src/js/pages/index.js"></script>
  </body>
</html>
