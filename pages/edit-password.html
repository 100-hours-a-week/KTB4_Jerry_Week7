<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 수정</title>
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <main class="flex flex-col items-center py-14">
      <h2 class="text-title text-ink">비밀번호 수정</h2>

      <form
        novalidate
        class="mt-8 flex flex-col w-full max-w-115 rounded-card border border-line bg-surface p-7 shadow-md gap-4"
      >
        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-label text-ink-muted"
            >비밀번호</label
          >
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="새 비밀번호를 입력하세요"
            class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
          />
          <p id="passwordHelper" class="min-h-4.5 text-caption text-danger"></p>
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="passwordConfirm" class="text-label text-ink-muted"
            >비밀번호 확인</label
          >
          <input
            id="passwordConfirm"
            name="passwordConfirm"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 한번 더 입력하세요"
            class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
          />
          <p
            id="passwordConfirmHelper"
            class="min-h-4.5 text-caption text-danger"
          ></p>
        </div>

        <button
          type="submit"
          id="submitBtn"
          disabled
          class="cursor-pointer mt-6 h-12 w-full rounded-xl bg-coral text-button text-white transition hover:brightness-95 disabled:opacity-50"
        >
          수정하기
        </button>
      </form>
    </main>

    <div
      id="toast"
      role="status"
      aria-live="polite"
      class="fixed bottom-10 left-1/2 hidden -translate-x-1/2 rounded-full bg-coral px-6 py-3 text-body text-white shadow-lg"
    >
      수정 완료
    </div>
    <script type="module" src="/src/js/pages/edit-password.js"></script>
  </body>
</html>
