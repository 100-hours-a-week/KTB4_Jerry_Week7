<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 수정</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body class="min-h-270 bg-background">
    <header class="border-b border-foreground">
      <div class="grid grid-cols-[1fr_auto_1fr] items-center h-26">
        <div></div>
        <h1 class="text-logo">아무 말 대잔치</h1>
        <div class="relative justify-self-start ml-33.25">
          <button
            id="profileBtn"
            class="h-9 w-9 overflow-hidden rounded-full bg-gray-200"
          >
            <img
              src=""
              alt="프로필"
              id="headerProfileAvatar"
              class="cursor-pointer h-full w-full object-cover"
            />
          </button>
          <ul
            id="profileMenu"
            class="absolute right-0 mt-2 hidden w-34 overflow-hidden bg-gray-300 shadow-md"
          >
            <li>
              <a
                href="/pages/edit-profile.html"
                class="block px-4 py-3 text-center text-sm hover:bg-menu-dropdown-hover"
                >회원정보수정</a
              >
            </li>
            <li>
              <a
                href="/pages/edit-password.html"
                class="block px-4 py-3 text-center text-sm hover:bg-menu-dropdown-hover"
                >비밀번호수정</a
              >
            </li>
            <li>
              <button
                type="button"
                id="logoutBtn"
                class="block w-full px-4 py-3 text-center text-sm hover:bg-menu-dropdown-hover"
              >
                로그아웃
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <main class="flex flex-col items-center pt-40">
      <h2 class="text-title">비밀번호 수정</h2>

      <form class="mt-6 flex w-98 flex-col gap-4" novalidate>
        <div class="flex flex-col gap-1">
          <label for="password" class="text-sm font-bold">비밀번호</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 입력하세요"
            class="rounded border px-3 py-2 text-sm"
          />
          <p id="passwordHelper" class="mt-1 text-xs text-red-500"></p>
        </div>

        <div class="flex flex-col gap-1">
          <label for="passwordConfirm" class="text-sm font-bold"
            >비밀번호 확인</label
          >
          <input
            id="passwordConfirm"
            name="passwordConfirm"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 한번 더 입력하세요"
            class="rounded border px-3 py-2 text-sm"
          />
          <p id="passwordConfirmHelper" class="mt-1 text-xs text-red-500"></p>
        </div>

        <button
          type="submit"
          id="submitBtn"
          disabled
          class="w-full rounded-xl bg-talktalk-primary-hover py-3 text-center text-sm text-white disabled:bg-talktalk-primary"
        >
          수정하기
        </button>
      </form>
    </main>

    <div
      id="toast"
      role="status"
      aria-live="polite"
      class="fixed bottom-10 left-1/2 hidden -translate-x-1/2 rounded-full bg-talktalk-primary px-6 py-3 text-sm text-white shadow-lg"
    >
      수정완료
    </div>
    <script type="module" src="/src/js/pages/edit-password.js"></script>
  </body>
</html>
