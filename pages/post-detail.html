<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글</title>
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body class="min-h-270 bg-background">
    <div id="app-header"></div>

    <main class="mx-auto max-w-150 py-8">
      <article>
        <h2 id="postTitle" class="text-heading text-ink"></h2>

        <div id="postMeta" class="mt-3 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <img
              id="postWriterAvatar"
              class="h-7 w-7 rounded-full bg-avatar object-cover"
            />
            <span
              id="postWriterName"
              class="text-label font-medium text-ink-muted"
            ></span>
            <time
              id="postCreatedAt"
              class="text-caption text-placeholder"
            ></time>
          </div>

          <div id="postActions" class="hidden gap-2">
            <a
              href=""
              id="editPostLink"
              class="cursor-pointer rounded-field border border-line px-3 py-1 text-label text-ink-muted transition hover:bg-sunken"
              >수정</a
            >
            <button
              type="button"
              id="deletePostBtn"
              class="cursor-pointer rounded-field border border-line px-3 py-1 text-label text-ink-muted transition hover:bg-sunken"
            >
              삭제
            </button>
          </div>
        </div>

        <hr class="my-5 border-line" />

        <div
          id="postImages"
          class="relative hidden overflow-hidden rounded-card bg-sunken"
        >
          <div
            id="carouselTrack"
            class="flex transition-transform duration-300 ease-out"
          ></div>
          <button
            type="button"
            id="carouselPrev"
            class="absolute cursor-pointer left-3 top-1/2 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full bg-ink/45 text-2xl leading-none text-white transition hover:bg-ink/65"
          >
            ‹
          </button>
          <button
            type="button"
            id="carouselNext"
            class="absolute cursor-pointer right-3 top-1/2 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full bg-ink/45 text-2xl leading-none text-white transition hover:bg-ink/65"
          >
            ›
          </button>
          <div
            id="carouselDots"
            class="absolute bottom-3 left-1/2 flex -translate-y-1/2 gap-1.5"
          ></div>
        </div>

        <div
          id="postContent"
          class="whitespace-pre-wrap py-6 text-body leading-relaxed text-ink"
        ></div>

        <div
          id="postStats"
          class="flex items-center gap-4 border-t border-line pt-4 text-label"
        >
          <button
            type="button"
            id="likeBtn"
            class="cursor-pointer flex items-center rounded-2xl bg-sunken px-4 py-2 font-bold text-ink-muted transition gap-2"
          >
            <span>♥</span><span>좋아요 <span id="likeCount"></span></span>
          </button>
          <span class="text-ink-subtle"
            >댓글 <span id="commentCount"></span
          ></span>
          <span class="text-ink-subtle"
            >조회수 <span id="viewCount"></span
          ></span>
        </div>
      </article>

      <div id="commentSection">
        <hr class="my-6 border-line" />

        <section>
          <h3 class="text-heading text-ink">댓글</h3>

          <form
            novalidate
            id="commentForm"
            class="mt-4 rounded-card border border-line bg-surface p-3"
          >
            <textarea
              id="commentInput"
              rows="3"
              placeholder="댓글을 남겨주세요!"
              class="w-full resize-none bg-transparent p-2 text-body text-ink placeholder:text-placeholder focus:outline-none"
            ></textarea>

            <div class="flex justify-end border-t border-line pt-3">
              <button
                disabled
                type="submit"
                id="commentSubmit"
                class="cursor-pointer rounded-xl bg-coral px-5 py-2 text-label font-bold text-white transition hover:brightness-95 disabled:opacity-50"
              >
                댓글 등록
              </button>
            </div>
          </form>
        </section>

        <ul id="commentList" class="mt-4 flex flex-col"></ul>

        <div class="mt-2 flex justify-center">
          <button
            type="button"
            id="loadMoreCommentsBtn"
            class="cursor-pointer mx-auto hidden rounded-xl border border-line px-4 py-2 text-label text-ink-muted transition hover:bg-sunken"
          >
            댓글 더보기
          </button>
        </div>
      </div>
    </main>
    <script type="module" src="/src/js/pages/post-detail.js"></script>
  </body>
</html>
