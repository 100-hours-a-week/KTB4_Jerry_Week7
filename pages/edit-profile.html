<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로필 수정</title>
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="flex flex-col items-center py-14">
      <h2 class="text-title">프로필 수정</h2>

      <form
        novalidate
        class="mt-8 flex w-full max-w-115 flex-col rounded-card border border-line bg-surface p-7 shadow-md"
      >
        <div class="flex flex-col items-center gap-2">
          <div class="flex flex-col justify-center">
            <span class="text-label text-ink-muted">프로필 이미지</span>
            <p id="profileHelper" class="text-xs text-danger"></p>
          </div>
          <label for="profileImage" class="flex flex-col items-center gap-2">
            <div class="h-32 w-32 overflow-hidden rounded-full bg-avatar">
              <img
                id="profilePreview"
                src=""
                class="h-full w-full object-cover"
              />
            </div>
            <span
              class="cursor-pointer text-label font-medium text-coral-strong"
              >이미지 변경</span
            >
            <input
              id="profileImage"
              type="file"
              accept="image/*"
              class="sr-only"
            />
          </label>
          <p id="profileHelper" class="min-h-4.5 text-caption text-danger"></p>
        </div>

        <div class="mt-4 flex flex-col gap-2">
          <div class="flex flex-col gap-1.5">
            <label for="nickname" class="text-label text-ink-muted"
              >닉네임</label
            >
            <input
              id="nickname"
              name="nickname"
              type="text"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
            <p
              id="nicknameHelper"
              class="min-h-4.5 text-caption text-danger"
            ></p>
          </div>

          <div class="flex flex-col gap-1.5">
            <span class="text-label text-ink-muted"
              >이메일 <span class="text-ink-subtle">(변경 불가)</span>
            </span>
            <p
              id="email"
              class="rounded-field border border-line bg-field-readonly px-3 py-2 text-body text-ink-subtle"
            ></p>
          </div>
        </div>

        <button
          type="submit"
          id="submitBtn"
          disabled
          class="cursor-pointer mt-10 h-12 w-full rounded-xl bg-coral text-button text-white transition hover:brightness-95 disabled:opacity-50"
        >
          수정하기
        </button>
      </form>

      <button
        type="button"
        id="withdrawBtn"
        class="cursor-pointer mt-4 text-label text-danger hover:underline"
      >
        회원 탈퇴
      </button>
    </main>
    <script type="module" src="/src/js/pages/edit-profile.js"></script>
  </body>
</html>
