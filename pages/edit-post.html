<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 수정</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body class="min-h-270 bg-background">
    <header class="border-b border-foreground">
      <div class="grid grid-cols-[1fr_auto_1fr] items-center h-26">
        <a
          id="backLink"
          href="/pages/post-detail.html"
          class="justify-self-end mr-33.25 text-2xl"
          >‹</a
        >
        <div class="flex h-26 items-center justify-center">
          <h1 class="text-logo">아무 말 대잔치</h1>
        </div>
        <div class="relative justify-self-start ml-33.25">
          <button
            id="profileBtn"
            class="h-9 w-9 overflow-hidden rounded-full bg-gray-200"
          >
            <img
              id="headerProfileAvatar"
              src=""
              alt="프로필"
              class="h-full w-full object-cover"
            />
          </button>
          <ul
            id="profileMenu"
            class="absolute right-0 mt-2 hidden w-40 overflow-hidden rounded-lg border bg-white shadow-md"
          >
            <li>
              <a
                href="/pages/edit-profile.html"
                class="block px-4 py-3 text-center text-sm hover:bg-menu-dropdown-hover"
                >회원정보수정</a
              >
            </li>
            <li>
              <a
                href="/pages/edit-password.html"
                class="block px-4 py-3 text-center text-sm hover:bg-menu-dropdown-hover"
                >비밀번호수정</a
              >
            </li>
            <li>
              <button
                type="button"
                id="logoutBtn"
                class="block w-full px-4 py-3 text-center text-sm hover:bg-menu-dropdown-hover"
              >
                로그아웃
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <main class="flex flex-col items-center justify-center py-6">
      <h2 class="text-title">게시글 수정</h2>

      <form class="mt-13 w-148 px-4" novalidate>
        <div class="flex flex-col gap-6">
          <div class="flex flex-col gap-3">
            <label for="title" class="text-base font-bold px-4">제목</label>
            <input
              id="title"
              name="title"
              type="text"
              autocomplete="title"
              maxlength="26"
              placeholder="제목을 입력해주세요. (최대 26글자)"
              class="border-y border-gray-200 px-3 py-2 h-16 text-sm placeholder:text-gray-500"
            />
          </div>

          <div class="flex flex-col gap-3">
            <label for="content" class="text-base font-bold px-4">내용</label>
            <textarea
              id="content"
              name="content"
              rows="10"
              placeholder="내용을 입력해주세요."
              class="resize-none border-y border-gray-200 bg-transparent px-3 py-4 text-sm placeholder:text-gray-400"
            ></textarea>
          </div>
        </div>

        <p id="formHelper" class="mt-1 text-sm text-red-500 px-4"></p>

        <div class="flex flex-col gap-1 px-4 mt-3">
          <span class="text-base font-bold">이미지</span>
          <div class="flex items-center gap-2">
            <label
              for="image"
              class="cursor-pointer rounded border border-black bg-gray-300 px-3 py-1 text-sm"
            >
              파일 선택
            </label>
            <span id="fileName" class="text-sm font-light"
              >파일을 선택해주세요.</span
            >
            <input
              id="image"
              name="image"
              type="file"
              accept="image/*"
              class="sr-only"
            />
          </div>
          <div id="imagePreview" class="mt-2 flex flex-wrap gap-2 px-4"></div>
        </div>

        <button
          type="submit"
          id="submitBtn"
          disabled
          class="mt-6 mx-auto w-90 h-9 rounded-lg bg-talktalk-primary-hover text-sm text-white flex items-center justify-center disabled:bg-talktalk-primary"
        >
          수정하기
        </button>
      </form>
    </main>
    <script type="module" src="/src/js/pages/edit-post.js"></script>
  </body>
</html>
