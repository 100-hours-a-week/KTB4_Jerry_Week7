<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 수정</title>
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body>
    <div id="app-header"></div>

    <main class="flex flex-col items-center justify-center py-14">
      <h2 class="text-title text-ink">게시글 수정</h2>

      <form
        novalidate
        class="mt-8 flex flex-col w-full max-w-148 rounded-card border border-line bg-surface p-7 shadow-md"
      >
        <div class="flex flex-col gap-5">
          <div class="flex flex-col gap-1.5">
            <label for="title" class="text-label text-ink-muted">제목</label>
            <input
              id="title"
              name="title"
              type="text"
              placeholder="제목을 입력해주세요. (최대 26글자)"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="content" class="text-label text-ink-muted">내용</label>
            <textarea
              id="content"
              name="content"
              rows="10"
              placeholder="내용을 입력해주세요."
              class="min-h-60 resize-none rounded-field border border-line bg-field px-3 py-4 text-body leading-relaxed text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            ></textarea>
          </div>

          <div class="flex flex-col gap-2">
            <span class="text-label text-ink-muted">이미지</span>
            <label
              for="image"
              class="w-fit cursor-pointer shrink-0 rounded-field border border-line-strong bg-sunken px-3 py-1.5 text-label text-ink-muted transition hover:bg-line"
              >파일 선택</label
            >
            <div
              id="imagePreview"
              class="flex flex-wrap pt-1 gap-2 empty:hidden"
            ></div>
            <input
              id="image"
              name="image"
              type="file"
              accept="image/*"
              class="sr-only"
            />
          </div>
        </div>

        <p
          id="formHelper"
          class="mt-1.5 min-h-4.5 text-caption text-danger"
        ></p>

        <button
          type="submit"
          id="submitBtn"
          disabled
          class="mt-6 h-12 w-full cursor-pointer rounded-xl bg-coral text-button text-white transition hover:brightness-95 disabled:opacity-50"
        >
          수정하기
        </button>
      </form>
    </main>
    <script type="module" src="/src/js/pages/edit-post.js"></script>
  </body>
</html>
