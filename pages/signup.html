<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body class="min-h-270 bg-background">
    <!-- 헤더  -->
    <header class="border-b border-foreground">
      <div class="grid grid-cols-[1fr_auto_1fr] items-center h-26">
        <a href="/pages/login.html" class="justify-self-end mr-33.25 text-2xl"
          >‹</a
        >
        <h1 class="text-logo">아무 말 대잔치</h1>
      </div>
    </header>

    <main class="flex flex-col items-center py-40">
      <h2 class="text-title">회원가입</h2>

      <form class="mt-6 flex w-98 flex-col gap-4" novalidate>
        <!-- 프로필 사진 -->
        <div class="flex flex-col gap-1">
          <div class="flex flex-col justify-center gap-1">
            <span class="text-sm font-bold">프로필 사진</span>
            <p id="profileHelper" class="text-xs text-red-500"></p>
          </div>
          <label
            for="profileImage"
            class="relative mx-auto flex h-40 w-40 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-gray-300"
          >
            <span class="text-4xl text-gray-500">+</span>
            <img
              id="profilePreview"
              class="absolute inset-0 hidden h-full w-full object-cover overflow-hidden"
            />
            <input
              id="profileImage"
              type="file"
              accept="image/*"
              class="sr-only"
            />
          </label>
        </div>

        <!-- 이메일 -->
        <div class="flex flex-col gap-1">
          <label for="email" class="text-sm font-bold"
            >이메일 <span class="text-red-500">*</span></label
          >
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="이메일을 입력하세요"
            class="rounded border px-3 py-2 text-sm placeholder:text-foreground"
          />
          <p id="emailHelper" class="mt-1 text-xs text-red-500"></p>
        </div>

        <!-- 비밀번호 -->
        <div class="flex flex-col gap-1">
          <label for="password" class="text-sm font-bold"
            >비밀번호 <span class="text-red-500">*</span></label
          >
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 입력하세요"
            class="rounded border px-3 py-2 text-sm placeholder:text-foreground"
          />
          <p id="passwordHelper" class="mt-1 text-xs text-red-500"></p>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="flex flex-col gap-1">
          <label for="passwordConfirm" class="text-sm font-bold"
            >비밀번호 확인 <span class="text-red-500">*</span></label
          >
          <input
            id="passwordConfirm"
            name="passwordConfirm"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 한번 더 입력하세요"
            class="rounded border px-3 py-2 text-sm placeholder:text-foreground"
          />
          <p id="passwordConfirmHelper" class="mt-1 text-xs text-red-500"></p>
        </div>

        <!-- 닉네임 -->
        <div class="flex flex-col gap-1">
          <label for="nickname" class="text-sm font-bold"
            >닉네임 <span class="text-red-500">*</span></label
          >
          <input
            id="nickname"
            name="nickname"
            type="text"
            autocomplete="nickname"
            placeholder="닉네임을 입력하세요"
            class="rounded border px-3 py-2 text-sm placeholder:text-foreground"
          />
          <p id="nicknameHelper" class="mt-1 text-xs text-red-500"></p>
        </div>

        <!-- 회원가입 -->
        <button
          type="submit"
          id="signupBtn"
          disabled
          class="cursor-pointer w-full rounded-xl bg-talktalk-primary-hover py-3 text-center text-sm text-white disabled:bg-talktalk-primary"
        >
          회원가입
        </button>
      </form>

      <!-- 로그인 페이지 이동 -->
      <a href="/pages/login.html" class="mt-2 text-sm text-foreground"
        >로그인하러 가기</a
      >
    </main>
    <script type="module" src="/src/js/pages/signup.js"></script>
  </body>
</html>
