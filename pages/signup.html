<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>

  <body>
    <main class="flex flex-col min-h-screen items-center py-16">
      <div class="text-center">
        <h1 class="text-[2rem] font-bold leading-none text-ink">회원가입</h1>
      </div>

      <form
        novalidate
        class="mt-8 flex w-full max-w-120 flex-col rounded-card border border-line bg-surface p-7 shadow-md"
      >
        <div class="flex flex-col items-center gap-2">
          <div class="flex flex-col justify-center">
            <span class="text-label text-ink-muted">프로필 이미지</span>
            <p id="profileHelper" class="text-xs text-danger"></p>
          </div>
          <label
            for="profileImage"
            class="relative flex h-32 w-32 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-avatar"
          >
            <span class="text-4xl text-ink-subtle">+</span>
            <img
              id="profilePreview"
              class="absolute inset-0 hidden h-full w-full object-cover"
            />
            <input
              id="profileImage"
              type="file"
              accept="image/*"
              class="sr-only"
            />
          </label>
          <p
            id="profileHelper"
            class="text-caption text-danger empty:hidden"
          ></p>
        </div>

        <div class="flex flex-col mt-4 gap-1.5">
          <div class="flex flex-col gap-1">
            <label for="email" class="text-label text-ink-muted"
              >이메일 <span class="text-danger">*</span></label
            >
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="이메일을 입력하세요"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
            <p id="emailHelper" class="min-h-4.5 text-caption text-danger"></p>
          </div>

          <div class="flex flex-col gap-1">
            <label for="password" class="text-label text-ink-muted"
              >비밀번호 <span class="text-danger">*</span></label
            >
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호를 입력하세요"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
            <p
              id="passwordHelper"
              class="min-h-4.5 text-caption text-danger"
            ></p>
          </div>

          <div class="flex flex-col gap-1">
            <label for="passwordConfirm" class="text-label text-ink-muted"
              >비밀번호 확인 <span class="text-danger">*</span></label
            >
            <input
              id="passwordConfirm"
              name="passwordConfirm"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호를 한번 더 입력하세요"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
            <p
              id="passwordConfirmHelper"
              class="min-h-4.5 text-caption text-danger"
            ></p>
          </div>

          <div class="flex flex-col gap-1">
            <label for="nickname" class="text-label text-ink-muted"
              >닉네임 <span class="text-danger">*</span></label
            >
            <input
              id="nickname"
              name="nickname"
              type="text"
              autocomplete="nickname"
              placeholder="닉네임을 입력하세요"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
            <p
              id="nicknameHelper"
              class="min-h-4.5 text-caption text-danger"
            ></p>
          </div>
        </div>

        <button
          type="submit"
          id="signupBtn"
          disabled
          class="cursor-pointer mt-4 w-full h-12 rounded-xl bg-coral text-button text-white transition hover:brightness-95 disabled:opacity-50"
        >
          회원가입
        </button>
      </form>

      <p class="mt-4 flex justify-center text-label text-ink-subtle">
        이미 계정이 있으신가요?
        <a href="/pages/login.html" class="px-1 font-medium text-coral-strong"
          >로그인하러 가기</a
        >
      </p>
    </main>
    <script type="module" src="/src/js/pages/signup.js"></script>
  </body>
</html>
