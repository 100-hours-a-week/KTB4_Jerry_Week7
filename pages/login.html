<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body class="min-h-270 bg-background">
    <header class="border-b border-foreground">
      <div class="flex h-26 items-center justify-center">
        <h1 class="text-logo">아무 말 대잔치</h1>
      </div>
    </header>

    <main class="flex flex-col items-center justify-center py-66">
      <h2 class="text-title">로그인</h2>

      <form class="mt-6 w-90" novalidate>
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="email" class="text-sm font-bold">이메일</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="이메일을 입력하세요"
              class="rounded border bg-white px-3 py-2 text-sm placeholder:text-foreground"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label for="password" class="text-sm font-bold">비밀번호</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="비밀번호를 입력하세요"
              class="rounded border bg-white px-3 py-2 text-sm placeholder:text-foreground"
            />
          </div>
        </div>

        <p id="helperText" class="mt-1 text-sm text-red-500"></p>

        <button
          type="submit"
          id="loginBtn"
          disabled
          class="mt-4 w-90 h-9 rounded-xl text-sm text-white flex items-center justify-center bg-talktalk-primary-hover disabled:bg-talktalk-primary"
        >
          로그인
        </button>
      </form>
    </main>
    <script type="module" src="/src/js/pages/login.js"></script>
  </body>
</html>
