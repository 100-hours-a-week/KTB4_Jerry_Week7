<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" href="/dist/styles.css" />
  </head>
  <body>
    <main class="flex flex-col min-h-screen items-center pt-36">
      <div class="text-center">
        <h1 class="text-[2rem] font-bold leading-none text-ink">톡톡</h1>
        <p class="mt-2 text-body text-ink-subtle">함께 소통하는 작은 세상</p>
      </div>

      <form
        novalidate
        class="mt-12 flex flex-col w-full max-w-95 rounded-card border border-line bg-surface p-7 shadow-md"
      >
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-2">
            <label for="email" class="text-label text-ink-muted">이메일</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="이메일을 입력하세요"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label for="password" class="text-label text-ink-muted"
              >비밀번호</label
            >
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="비밀번호를 입력하세요"
              class="rounded-field border border-line bg-field px-3 py-2 text-body text-ink placeholder:text-placeholder focus:border-coral focus:outline-none"
            />
          </div>
        </div>

        <p id="helperText" class="mt-2 text-caption text-danger"></p>

        <button
          type="submit"
          id="loginBtn"
          disabled
          class="cursor-pointer mt-8 w-full h-12 rounded-xl bg-coral text-button text-white transition hover:brightness-95 disabled:opacity-50"
        >
          로그인
        </button>

        <p class="mt-2 flex justify-center text-label text-ink-subtle">
          아직 회원이 아니신가요?
          <a
            href="/pages/signup.html"
            class="px-1 font-medium text-coral-strong"
          >
            회원가입하러 가기</a
          >
        </p>
      </form>
    </main>
    <script type="module" src="/src/js/pages/login.js"></script>
  </body>
</html>
